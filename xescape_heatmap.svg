  <rect x="80" y="238" width="544" height="68" fill="#f0f4ff" rx="5" stroke="#c3d0ee" stroke-width="1"/><text x="92" y="255" font-size="10.5" fill="#2c3e7a" font-weight="600">Sex-chromosome dosage hypothesis</text><text x="92" y="270" font-size="9.5" fill="#444">XY individuals: 1 copy of each escapee gene  →  baseline expression</text><text x="92" y="284" font-size="9.5" fill="#444">XX individuals: 2 copies (both X active for escapees)  →  ~2× dosage</text><text x="92" y="298" font-size="9.5" fill="#555">KDM6A (H3K27 demethylase) &amp; KDM5C (H3K4 demethylase) are chromatin regulators — dosage differences may underlie sex-biased resilience to brain aging.</text>
